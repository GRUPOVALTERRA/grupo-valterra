name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  validate:
    name: Typecheck · Lint · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src --max-warnings=10

      - name: Build
        env:
          # Dummies para que el build no rompa - el path real usa env de Vercel.
          # Si no se setean, el service cae a memoria.
          NODE_ENV: production
        run: npm run build
